name: Deploy WASM WebGPU-Only Horror Engine (Strict Mode)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14

      - name: Build WebGPU Engine (NO FALLBACKS)
        run: |
          mkdir -p src/engine web

          cat > src/engine/main.cpp << 'EOF'
          #include <emscripten.h>
          #include <cmath>

          static float t = 0.0f;

          float playerX = 5.0f;
          float enemyX  = 10.0f;

          float sanity = 1.0f;

          void update(){
              t += 0.016f;

              float d = fabs(playerX - enemyX);
              sanity -= (d < 3.0f) ? 0.01f : 0.002f;
              if(sanity < 0) sanity = 0;
          }

          extern "C" {

          EMSCRIPTEN_KEEPALIVE
          void frame(){
              update();

              EM_ASM({
                  const canvas = Module.canvas;

                  if(!navigator.gpu){
                      const ctx = canvas.getContext("2d");
                      ctx.fillStyle = "black";
                      ctx.fillRect(0,0,canvas.width,canvas.height);
                      ctx.fillStyle = "red";
                      ctx.font = "20px monospace";
                      ctx.fillText("WEBGPU NOT SUPPORTED", 20, 40);
                      return;
                  }

                  navigator.gpu.requestAdapter().then(adapter=>{
                      if(!adapter){
                          console.error("No GPU adapter");
                          return;
                      }

                      adapter.requestDevice().then(device=>{
                          const context = canvas.getContext("webgpu");

                          const format = navigator.gpu.getPreferredCanvasFormat();

                          context.configure({
                              device,
                              format,
                              alphaMode: "premultiplied"
                          });

                          const encoder = device.createCommandEncoder();

                          const pass = encoder.beginRenderPass({
                              colorAttachments:[{
                                  view: context.getCurrentTexture().createView(),
                                  loadOp: "clear",
                                  clearValue: {
                                      r: 0.02,
                                      g: 0.02,
                                      b: 0.05,
                                      a: 1
                                  },
                                  storeOp: "store"
                              }]
                          });

                          pass.end();

                          device.queue.submit([encoder.finish()]);
                      });
                  });

              });
          }

          EMSCRIPTEN_KEEPALIVE
          void init(){
              EM_ASM({
                  const canvas = document.body.appendChild(document.createElement("canvas"));

                  canvas.width = window.innerWidth;
                  canvas.height = window.innerHeight;

                  Module.canvas = canvas;
              });
          }

          }

          int main(){
              init();
              emscripten_set_main_loop(frame, 60, 1);
          }
          EOF

      - name: Build WASM (WebGPU target)
        run: |
          em++ src/engine/main.cpp \
            -O2 \
            -s WASM=1 \
            -s ALLOW_MEMORY_GROWTH=1 \
            -o web/engine.js

          cat > web/index.html << 'EOF'
          <!doctype html>
          <html>
          <head>
            <style>
              body { margin:0; overflow:hidden; background:black; }
              canvas { width:100vw; height:100vh; display:block; }
            </style>
          </head>
          <body>
            <script>
              var Module = {
                canvas: null
              };
            </script>
            <script src="engine.js"></script>
          </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
